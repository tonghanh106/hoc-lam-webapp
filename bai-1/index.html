<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Đăng nhập hệ thống</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
rel="stylesheet">

</head>

<body>

<div class="background"></div>

<div class="login-container">

<div class="login-card">

<h2>Đăng nhập</h2>

<p class="subtitle">Chào mừng bạn quay trở lại</p>

<form id="loginForm">

<div class="form-group">

<i class="fa fa-user"></i>

<input type="text" id="email" placeholder="Email hoặc tên đăng nhập">

</div>

<div class="form-group">

<i class="fa fa-lock"></i>

<input type="password" id="password" placeholder="Mật khẩu">

<i class="fa fa-eye toggle" id="togglePassword"></i>

</div>

<div class="row">

<label class="remember">

<input type="checkbox">
Ghi nhớ đăng nhập

</label>

<a href="#" class="forgot">Quên mật khẩu?</a>

</div>

<button type="submit" id="loginBtn">

<span>Đăng nhập</span>

<div class="spinner"></div>

</button>

</form>

<div class="divider">

<span>Hoặc</span>

</div>

<button class="social google">

<i class="fa-brands fa-google"></i>
Đăng nhập bằng Google

</button>

<button class="social github">

<i class="fa-brands fa-github"></i>
Đăng nhập bằng GitHub

</button>

<p class="register">

Chưa có tài khoản?
<a href="#">Tạo tài khoản</a>

</p>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
